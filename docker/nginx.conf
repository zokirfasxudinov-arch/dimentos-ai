# Dimentos AI Studio OS - Nginx Reverse Proxy
# Server IP: 195.158.22.118
# Domain: dimentosai.uz

# API backend
upstream dimentos_api {
    server 127.0.0.1:8001;
    keepalive 32;
}

# Web panel
upstream dimentos_web {
    server 127.0.0.1:3000;
    keepalive 16;
}

# app.dimentosai.uz → Web Panel (port 3000)
server {
    listen 80;
    server_name app.dimentosai.uz dimentosai.uz;

    client_max_body_size 20M;

    location / {
        proxy_pass http://dimentos_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}

# api.dimentosai.uz → FastAPI (port 8001)
server {
    listen 80;
    server_name api.dimentosai.uz;

    client_max_body_size 20M;

    location / {
        proxy_pass http://dimentos_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;

        # CORS для веб-панели
        add_header Access-Control-Allow-Origin "https://app.dimentosai.uz" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # WebSocket support (для будущего)
    location /ws {
        proxy_pass http://dimentos_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
