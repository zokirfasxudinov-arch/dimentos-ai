<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dimentos AI Studio OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cyber: { bg: '#0a0e1a', card: '#0f1629', border: '#1e2d4a', accent: '#00d4ff', text: '#c8d6f0', dim: '#6b7fa3' }
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0a0e1a; color: #c8d6f0; font-family: 'Courier New', monospace; }
    .card { background: #0f1629; border: 1px solid #1e2d4a; border-radius: 0.75rem; }
    .badge-low { background: rgba(0,200,100,0.15); color: #00c864; border: 1px solid rgba(0,200,100,0.3); }
    .badge-medium { background: rgba(255,200,0,0.15); color: #ffc800; border: 1px solid rgba(255,200,0,0.3); }
    .badge-high { background: rgba(255,60,60,0.15); color: #ff3c3c; border: 1px solid rgba(255,60,60,0.3); }
    .badge-pending { background: rgba(0,212,255,0.15); color: #00d4ff; border: 1px solid rgba(0,212,255,0.3); }
    .badge-approved { background: rgba(0,200,100,0.15); color: #00c864; border: 1px solid rgba(0,200,100,0.3); }
    .badge-rejected { background: rgba(255,60,60,0.15); color: #ff3c3c; border: 1px solid rgba(255,60,60,0.3); }
    .nav-btn { padding: 0.5rem 1rem; border-radius: 0.5rem; transition: all 0.2s; cursor: pointer; border: 1px solid transparent; }
    .nav-btn:hover, .nav-btn.active { background: rgba(0,212,255,0.1); color: #00d4ff; border-color: rgba(0,212,255,0.3); }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <header class="border-b border-cyber-border px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-cyan-500/20 border border-cyan-500/40 flex items-center justify-center text-cyan-400 font-bold">D</div>
      <div>
        <h1 class="text-sm font-bold text-white">Dimentos AI Studio OS</h1>
        <p class="text-xs text-cyber-dim">dimentosai.uz</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span id="health-dot" class="w-2 h-2 rounded-full bg-gray-500"></span>
      <span id="health-text" class="text-xs text-cyber-dim">Connecting...</span>
    </div>
  </header>

  <div class="flex">
    <!-- Sidebar -->
    <nav class="w-48 min-h-screen border-r border-cyber-border p-3 space-y-1 text-sm">
      <button class="nav-btn active w-full text-left" onclick="showSection('dashboard')">Dashboard</button>
      <button class="nav-btn w-full text-left" onclick="showSection('agents')">Agents</button>
      <button class="nav-btn w-full text-left" onclick="showSection('approvals')">Approvals</button>
      <button class="nav-btn w-full text-left" onclick="showSection('tasks')">Tasks</button>
      <button class="nav-btn w-full text-left" onclick="showSection('projects')">Projects</button>
      <button class="nav-btn w-full text-left" onclick="showSection('logs')">Logs</button>
    </nav>

    <!-- Main content -->
    <main class="flex-1 p-6 space-y-4">

      <!-- Dashboard -->
      <div id="section-dashboard">
        <h2 class="text-lg font-bold text-white mb-4">Dashboard</h2>
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
          <div class="card p-4">
            <p class="text-xs text-cyber-dim mb-1">Approvals Pending</p>
            <p class="text-2xl font-bold text-cyan-400" id="stat-pending">—</p>
          </div>
          <div class="card p-4">
            <p class="text-xs text-cyber-dim mb-1">Active Agents</p>
            <p class="text-2xl font-bold text-green-400" id="stat-agents">—</p>
          </div>
          <div class="card p-4">
            <p class="text-xs text-cyber-dim mb-1">Open Tasks</p>
            <p class="text-2xl font-bold text-yellow-400" id="stat-tasks">—</p>
          </div>
          <div class="card p-4">
            <p class="text-xs text-cyber-dim mb-1">Projects</p>
            <p class="text-2xl font-bold text-purple-400" id="stat-projects">—</p>
          </div>
        </div>

        <div class="card p-4">
          <p class="text-xs text-cyber-dim uppercase tracking-widest mb-3">System Services</p>
          <div id="services-list" class="space-y-2">
            <p class="text-xs text-cyber-dim">Loading...</p>
          </div>
        </div>
      </div>

      <!-- Agents -->
      <div id="section-agents" class="hidden">
        <h2 class="text-lg font-bold text-white mb-4">Agents</h2>
        <div id="agents-list" class="space-y-2">
          <p class="text-xs text-cyber-dim">Loading...</p>
        </div>
      </div>

      <!-- Approvals -->
      <div id="section-approvals" class="hidden">
        <h2 class="text-lg font-bold text-white mb-4">Approval Requests</h2>
        <div id="approvals-list" class="space-y-3">
          <p class="text-xs text-cyber-dim">Loading...</p>
        </div>
      </div>

      <!-- Tasks -->
      <div id="section-tasks" class="hidden">
        <h2 class="text-lg font-bold text-white mb-4">Tasks</h2>
        <div id="tasks-list" class="space-y-2">
          <p class="text-xs text-cyber-dim">Loading...</p>
        </div>
      </div>

      <!-- Projects -->
      <div id="section-projects" class="hidden">
        <h2 class="text-lg font-bold text-white mb-4">Projects</h2>
        <div id="projects-list" class="space-y-2">
          <p class="text-xs text-cyber-dim">Loading...</p>
        </div>
      </div>

      <!-- Logs -->
      <div id="section-logs" class="hidden">
        <h2 class="text-lg font-bold text-white mb-4">Agent Logs</h2>
        <div id="logs-list" class="space-y-2 font-mono text-xs">
          <p class="text-cyber-dim">Loading...</p>
        </div>
      </div>

    </main>
  </div>

<script>
const API = window.location.protocol + '//' + window.location.hostname + ':8000';

function showSection(name) {
  document.querySelectorAll('[id^="section-"]').forEach(el => el.classList.add('hidden'));
  document.getElementById('section-' + name).classList.remove('hidden');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  loadSection(name);
}

async function api(path) {
  try {
    const r = await fetch(API + path);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

function riskBadge(r) {
  return `<span class="badge-${(r||'low').toLowerCase()} text-[10px] px-2 py-0.5 rounded font-mono">${r||'LOW'}</span>`;
}
function statusBadge(s) {
  const cls = s === 'pending' ? 'badge-pending' : s === 'approved' ? 'badge-approved' : s === 'rejected' ? 'badge-rejected' : 'badge-medium';
  return `<span class="${cls} text-[10px] px-2 py-0.5 rounded font-mono">${s}</span>`;
}

async function checkHealth() {
  const data = await api('/health');
  const dot = document.getElementById('health-dot');
  const text = document.getElementById('health-text');
  if (data && data.status === 'ok') {
    dot.className = 'w-2 h-2 rounded-full bg-green-400';
    text.textContent = 'Online';
    text.className = 'text-xs text-green-400';
    return data;
  } else {
    dot.className = 'w-2 h-2 rounded-full bg-red-400';
    text.textContent = 'Offline';
    text.className = 'text-xs text-red-400';
    return null;
  }
}

async function loadDashboard() {
  const health = await checkHealth();

  // Services
  const services = document.getElementById('services-list');
  if (health && health.services) {
    services.innerHTML = Object.entries(health.services).map(([k, v]) => `
      <div class="flex items-center justify-between">
        <span class="text-xs text-cyber-text font-mono">${k}</span>
        <span class="text-[10px] px-2 py-0.5 rounded ${v === 'ok' ? 'badge-low' : 'badge-high'}">${v}</span>
      </div>
    `).join('');
  } else {
    services.innerHTML = '<p class="text-xs text-red-400">API not reachable</p>';
  }

  // Stats
  const [approvals, agents, tasks, projects] = await Promise.all([
    api('/api/approvals?status=pending'),
    api('/api/agents/status'),
    api('/api/tasks'),
    api('/api/projects'),
  ]);

  document.getElementById('stat-pending').textContent = approvals?.length ?? '—';
  document.getElementById('stat-agents').textContent = agents?.length ?? '—';
  document.getElementById('stat-tasks').textContent = tasks?.length ?? '—';
  document.getElementById('stat-projects').textContent = projects?.length ?? '—';
}

async function loadSection(name) {
  if (name === 'dashboard') { loadDashboard(); return; }

  if (name === 'agents') {
    const data = await api('/api/agents/status');
    const el = document.getElementById('agents-list');
    if (!data || !data.length) { el.innerHTML = '<p class="text-xs text-cyber-dim">No agents data</p>'; return; }
    el.innerHTML = data.map(a => `
      <div class="card p-3 flex items-center justify-between">
        <div>
          <p class="text-sm text-white font-mono">${a.name}</p>
          <p class="text-xs text-cyber-dim">${a.description || ''}</p>
        </div>
        <div class="flex items-center gap-2">
          ${riskBadge(a.risk_level)}
          ${statusBadge(a.status || 'idle')}
        </div>
      </div>
    `).join('');
  }

  if (name === 'approvals') {
    const data = await api('/api/approvals');
    const el = document.getElementById('approvals-list');
    if (!data || !data.length) { el.innerHTML = '<p class="text-xs text-cyber-dim">No approval requests</p>'; return; }
    el.innerHTML = data.map(a => `
      <div class="card p-4">
        <div class="flex items-start justify-between mb-2">
          <div>
            <p class="text-sm text-white font-mono">${a.action}</p>
            <p class="text-xs text-cyber-dim">${a.agent} · ${a.requested_at?.slice(0,16) || ''}</p>
          </div>
          <div class="flex gap-1.5">
            ${riskBadge(a.risk_level)}
            ${statusBadge(a.status)}
          </div>
        </div>
        <p class="text-xs text-cyber-text mb-3">${a.description}</p>
        ${a.status === 'pending' ? `
          <div class="flex gap-2">
            <button onclick="approveRequest('${a.id}')" class="px-3 py-1 text-xs rounded bg-green-500/20 text-green-400 border border-green-500/30 hover:bg-green-500/30">✅ Подтвердить</button>
            <button onclick="rejectRequest('${a.id}')" class="px-3 py-1 text-xs rounded bg-red-500/20 text-red-400 border border-red-500/30 hover:bg-red-500/30">❌ Отказать</button>
          </div>
        ` : ''}
      </div>
    `).join('');
  }

  if (name === 'tasks') {
    const data = await api('/api/tasks');
    const el = document.getElementById('tasks-list');
    if (!data || !data.length) { el.innerHTML = '<p class="text-xs text-cyber-dim">No tasks</p>'; return; }
    el.innerHTML = data.map(t => `
      <div class="card p-3 flex items-center justify-between">
        <div>
          <p class="text-sm text-white font-mono">${t.title}</p>
          <p class="text-xs text-cyber-dim">${t.agent || 'unassigned'} · ${t.created_at?.slice(0,10) || ''}</p>
        </div>
        ${statusBadge(t.status)}
      </div>
    `).join('');
  }

  if (name === 'projects') {
    const data = await api('/api/projects');
    const el = document.getElementById('projects-list');
    if (!data || !data.length) { el.innerHTML = '<p class="text-xs text-cyber-dim">No projects</p>'; return; }
    el.innerHTML = data.map(p => `
      <div class="card p-3 flex items-center justify-between">
        <div>
          <p class="text-sm text-white font-mono">${p.name}</p>
          <p class="text-xs text-cyber-dim">${p.description || ''}</p>
        </div>
        ${statusBadge(p.status)}
      </div>
    `).join('');
  }

  if (name === 'logs') {
    const data = await api('/api/logs/agents?limit=50');
    const el = document.getElementById('logs-list');
    if (!data || !data.length) { el.innerHTML = '<p class="text-cyber-dim">No logs</p>'; return; }
    el.innerHTML = data.map(l => `
      <div class="flex items-start gap-3 border-b border-cyber-border/30 py-1.5">
        <span class="text-cyber-dim shrink-0">${l.timestamp?.slice(0,19) || ''}</span>
        <span class="text-cyan-400 shrink-0">[${l.agent_name}]</span>
        <span class="${l.risk_level === 'HIGH' ? 'text-red-400' : l.risk_level === 'MEDIUM' ? 'text-yellow-400' : 'text-green-400'} shrink-0">${l.risk_level}</span>
        <span class="text-cyber-text">${l.action}</span>
      </div>
    `).join('');
  }
}

async function approveRequest(id) {
  await fetch(API + '/api/approvals/' + id + '/approve', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({decided_by: 'web_panel', reason: 'Approved via Web Panel'})
  });
  loadSection('approvals');
}

async function rejectRequest(id) {
  await fetch(API + '/api/approvals/' + id + '/reject', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({decided_by: 'web_panel', reason: 'Rejected via Web Panel'})
  });
  loadSection('approvals');
}

// Initial load
loadDashboard();
setInterval(checkHealth, 30000);
</script>
</body>
</html>
